name: Audit

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/audit.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/audit.toml"
      - ".github/workflows/audit.yml"
  schedule:
    # Weekly on Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Vulnerabilities fail the job; unmaintained/unsound advisories surface
      # in the log without breaking CI (each requires a major dep bump
      # tracked as follow-up). Per-advisory ignores live in .cargo/audit.toml.
      - name: Run cargo audit
        run: cargo audit
