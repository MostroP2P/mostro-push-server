# markdownlint config for .planning/ (GSD planning artifacts).
# This file applies to every .md under .planning/; it does NOT affect the
# rest of the repo (CLAUDE.md, README.md, docs/**) — those continue to be
# linted with the default ruleset.
#
# Why MD046 is disabled here:
#   GSD plan templates use 4-space indentation under XML-like tags
#   (<action>, <objective>, <decisions>, <threat_model>, ...) for visual
#   structure. The indented blocks are descriptive prose and bullet
#   lists, not source code, but markdownlint-cli2 cannot distinguish the
#   two and flags every such block as MD046 ("expected fenced, actual
#   indented"). Converting them to fenced blocks would corrupt the plan
#   structure that the GSD orchestrator and reviewers depend on.
#
# Inherits all other rules from markdownlint defaults.
default: true
MD046: false  # code-block-style: allow indented blocks alongside fenced ones
